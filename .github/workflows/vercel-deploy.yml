name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercelToken: \$\{{ secrets.VERCEL_TOKEN }}
          githubToken: \$\{{ secrets.GITHUB_TOKEN }}
          vercelArgs: '--prod'
