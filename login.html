<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>潘多拉</title>
    <style>
        :root {
            --primary-color: #FF385C;
            --secondary-color: #FE2C55;
            --bg-color: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #666;
            --border-color: #EBEBEB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        body {
            max-width: 450px;
            margin: 0 auto;
            background: var(--bg-color);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            z-index: 0;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .video-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;  /* 淇濊瘉瀹藉害瑕嗙洊瀹瑰櫒 */
    min-height: 100%; /* 淇濊瘉楂樺害瑕嗙洊瀹瑰櫒 */
    width: auto;
    height: auto;
    object-fit: cover; /* 鍏抽敭灞炴€э細淇濇寔姣斾緥骞惰鐩栧鍣?*/
    transform: translate(-50%, -50%); /* 灞呬腑瀹氫綅 */
    z-index: 0;
}

        /* 鍥剧墖鑳屾櫙浼樺寲 */
        .image-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            object-fit: cover;
            filter: brightness(0.85);
        }

        .image-bg.active {
            opacity: 1;
        }

        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 24px;
        }

        .branding {
            text-align: center;
            color: white;
            margin-top: 30vh;
            padding: 0 16px;
        }

        .slogan {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -1px;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.8rem;
            opacity: 0.95;
            font-weight: 400;
            letter-spacing: 0.5px;
            line-height: 1.4;
            margin-top: 8px;
        }

        .auth-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 6vh;
        }

        .wechat-login-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 18px;
            border-radius: 28px;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(255, 56, 92, 0.24);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wechat-login-btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 12px rgba(255, 56, 92, 0.24);
        }

        .app-info {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-top: 24px;
        }

        @media (max-width: 400px) {
            .slogan {
                font-size: 2.4rem;
                letter-spacing: -0.5px;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            .wechat-login-btn {
                font-size: 16px;
                padding: 16px;
            }
        }

        @media (max-height: 700px) {
            .branding {
                margin-top: 15vh;
            }

            .auth-section {
                margin-bottom: 4vh;
            }
        }
    </style>
</head>
<body>
    <div class="background-container" id="bg-container">
        <div class="background-overlay"></div>
    </div>
    <div class="content-wrapper">
        <div class="branding">
            <h1 class="slogan">潘多拉</h1>
            <p class="subtitle">鏁板瓧鐢熷懡</p>
        </div>

        <div class="auth-section">
            <button class="wechat-login-btn" onclick="wechatLogin()">
                寰俊涓€閿櫥褰?
            </button>
        </div>
    </div>
    <footer style="
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.8);
        font-size: 12px;
        line-height: 1.5;
        z-index: 2;
        padding: 0 20px;
    ">
        <div class="container">
            <a href="https://beian.miit.gov.cn/" target="_blank" style="color: inherit; text-decoration: none;">
                娌狪CP澶?024084340鍙?1
            </a>
            <p style="margin-top: 4px;">&copy; 2023-2025 涓婃捣浜戣櫄浜掍即绉戞妧鏈夐檺鍏徃 淇濈暀鎵€鏈夋潈鍒?/p>
        </div>
    </footer>
    <script src="js2/l.js"></script>
</body>
</html>
