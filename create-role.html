<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人 - 潘多拉</title>
    <link href="css/material-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/xs-styles.css">
    <style>
        :root {
            --primary-color: #FF385C;
            --bg-color: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #666;
            --border-color: #EBEBEB;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F5F5; color: var(--text-primary); }

        .role-page {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-color);
            position: relative;
        }

        .role-header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        .role-header .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 4px 8px;
        }
        .role-header h2 {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-right: 28px;
        }

        .role-display {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .role-display .avatar-large {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .role-display .role-name-display {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-top: 16px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .role-display .role-desc-display {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            margin-top: 4px;
        }
        .role-display .live-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,56,92,0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .role-display .live-dot {
            width: 8px; height: 8px; background: white; border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .role-actions {
            padding: 20px 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px 12px;
            background: #F8F9FA;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #EEF0F2; transform: translateY(-2px); }
        .action-btn .material-icons { font-size: 32px; color: var(--primary-color); }
        .action-btn span { font-size: 14px; color: var(--text-primary); font-weight: 500; }

        .chat-section {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }
        .chat-input-area input:focus { border-color: var(--primary-color); }
        .chat-input-area .send-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .energy-bar {
            padding: 12px 16px;
            background: linear-gradient(90deg, #FFF5F5, #FFE8E8);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #CC0000;
        }
        .energy-bar .material-icons { font-size: 18px; }

        .demo-notice {
            margin: 16px;
            padding: 12px;
            background: #FFF8E1;
            border-radius: 8px;
            font-size: 13px;
            color: #F57F17;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="role-page">
    <div class="role-header">
        <button class="back-btn" onclick="history.back()"><span class="material-icons">arrow_back</span></button>
        <h2 id="roleTitle">数字人详情</h2>
    </div>

    <div class="role-display" id="roleDisplay">
        <div class="live-indicator"><div class="live-dot"></div> 在线</div>
        <img class="avatar-large" id="roleAvatar" src="" alt="">
        <div class="role-name-display" id="roleNameDisplay">--</div>
        <div class="role-desc-display" id="roleDescDisplay">--</div>
    </div>

    <div class="energy-bar">
        <span class="material-icons">bolt</span>
        剩余能量：<span id="energyLeft">10000</span> | 视频次数：<span id="videoLeft">3</span>
    </div>

    <div class="role-actions">
        <div class="action-btn" onclick="showNotice('视频生成功能开发中...')">
            <span class="material-icons">videocam</span>
            <span>生成视频</span>
        </div>
        <div class="action-btn" onclick="showNotice('语音合成功能开发中...')">
            <span class="material-icons">record_voice_over</span>
            <span>语音合成</span>
        </div>
        <div class="action-btn" onclick="showNotice('实时对话功能开发中...')">
            <span class="material-icons">forum</span>
            <span>实时对话</span>
        </div>
        <div class="action-btn" onclick="showNotice('声音克隆功能开发中...')">
            <span class="material-icons">mic</span>
            <span>声音克隆</span>
        </div>
    </div>

    <div class="demo-notice">
        💡 演示模式：当前所有功能为前端预览，实际数字人生成需要接入后端 API 服务。
    </div>

    <div class="chat-section">
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="输入消息与数字人互动...">
            <button class="send-btn" onclick="sendChat()"><span class="material-icons" style="font-size:20px">send</span></button>
        </div>
    </div>
</div>

<script>
// Get role from URL params
const params = new URLSearchParams(window.location.search);
const roleId = params.get('id') || localStorage.getItem('selected_role_id') || '1';

const demoRoles = [
    {id:1, name:"小潘", desc:"活泼开朗的潘多拉助手", avatar:"images/avatar1.svg", bg:"linear-gradient(135deg, #FF6B6B 0%, #C62828 100%)"},
    {id:2, name:"安安", desc:"温柔知性的陪伴伙伴", avatar:"images/avatar2.svg", bg:"linear-gradient(135deg, #4ECDC4 0%, #00695C 100%)"},
    {id:3, name:"小智", desc:"专业高效的知识顾问", avatar:"images/avatar3.svg", bg:"linear-gradient(135deg, #45B7D1 0%, #1565C0 100%)"},
    {id:4, name:"小美", desc:"时尚美妆达人", avatar:"images/avatar4.svg", bg:"linear-gradient(135deg, #96CEB4 0%, #2E7D32 100%)"},
    {id:5, name:"小文", desc:"文艺清新的内容博主", avatar:"images/avatar5.svg", bg:"linear-gradient(135deg, #DDA0DD 0%, #6A1B9A 100%)"},
    {id:6, name:"小勇", desc:"阳光运动的健身教练", avatar:"images/avatar6.svg", bg:"linear-gradient(135deg, #FFD93D 0%, #E65100 100%)"}
];

const role = demoRoles.find(r => r.id == roleId) || demoRoles[0];

document.getElementById('roleTitle').textContent = role.name;
document.getElementById('roleAvatar').src = role.avatar;
document.getElementById('roleNameDisplay').textContent = role.name;
document.getElementById('roleDescDisplay').textContent = role.desc;
document.getElementById('roleDisplay').style.background = role.bg;

const tl = localStorage.getItem('token_balance') || '10000';
const vl = localStorage.getItem('video_balance') || '3';
document.getElementById('energyLeft').textContent = tl;
document.getElementById('videoLeft').textContent = vl;

localStorage.setItem('selected_role_id', roleId);

function showNotice(msg) {
    alert(msg + '\n\n💡 提示：该功能需要接入后端 API 服务才能正常使用。\n后续可接入 DH_live 数字人引擎或第三方 API。');
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    showNotice('消息已收到："' + msg + '" \n\n💡 实时对话功能需要接入 LLM + TTS 服务。');
    input.value = '';
}

document.getElementById('chatInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendChat();
});
</script>
</body>
</html>
