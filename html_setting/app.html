<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潘多拉-App涓嬭浇</title>
    <link href="../css/material-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 0 16px;
        }

        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            margin-bottom: 10px;
            position: relative;
        }

        .title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: 500;
        }

        .nav-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: none;
            cursor: pointer;
            z-index: 1;
        }

        .container {
            max-width: 400px;
            margin: 16px auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 32px 24px;
            background: #f8f9fa;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e9ecef;
        }

        .download-icon {
            font-size: 56px;
            color: #667eea;
        }

        .download-details h3 {
            font-size: 18px;
            margin-bottom: 6px;
            color: #1a1a1a;
        }

        .download-details p {
            font-size: 13px;
            color: #6c757d;
        }

        .download-btn, .generate-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff3c64 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(255, 60, 100, 0.4);
            width: 100%;
            margin-top: 16px;
        }

        .download-btn:hover, .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 60, 100, 0.5);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .code-display {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .code-number {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .code-number.empty-state {
            color: #ccc;
            font-size: 14px;
        }

        .code-hint {
            font-size: 12px;
            color: #999;
        }

        .code-expiry {
            font-size: 12px;
            color: #ff3c64;
            margin-top: 8px;
            font-weight: 500;
        }

        .countdown {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-top: 8px;
        }

        .material-icons {
            color: #ff3c64;
        }

        @media (max-width: 375px) {
            .card {
                padding: 20px;
            }
            .code-number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <button class="nav-button" onclick="history.back()">
            <i class="material-icons">arrow_back</i>
        </button>
        <div class="title">App涓嬭浇</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">
                <i class="material-icons">android</i>
                涓嬭浇 App
            </div>
            <div class="download-info">
                <i class="material-icons download-icon">phone_android</i>
                <div class="download-details">
                    <h3>潘多拉 Android</h3>
                    <p>鐗堟湰 1.0 | 澶у皬 1.0 MB</p>
                </div>
            </div>
            <a href="https://www.pgyer.com/潘多拉-android" target="_blank" class="download-btn">
                鐐瑰嚮涓嬭浇
            </a>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="material-icons">qr_code_2</i>
                App 鐧诲綍鐮?            </div>
            <div class="code-display">
                <div class="code-number empty-state">鐐瑰嚮涓嬫柟鎸夐挳鐢熸垚</div>
                <div class="code-hint"></div>
                <div class="code-expiry"></div>
            </div>
            <button class="generate-btn" id="generateBtn" onclick="generateCode()">
                鐢熸垚鐧诲綍鐮?            </button>
            <div class="countdown" id="countdown"></div>
        </div>
    </div>

    <script>
        let expiryTimer, cooldownTimer;

        async function generateCode() {
            const btn = document.getElementById('generateBtn');
            const codeNumber = document.querySelector('.code-number');
            const codeHint = document.querySelector('.code-hint');
            const codeExpiry = document.querySelector('.code-expiry');
            const countdownEl = document.getElementById('countdown');

            try {
                const unionid = localStorage.getItem('unionid');
                const response = await fetch('/api/auth/generate_app_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        unionid: unionid
                    })
                });
                
                if (!response.ok) throw new Error('鐢熸垚澶辫触');
                const data = await response.json();

                if (data.app_code) {
                    codeNumber.textContent = data.app_code;
                    codeNumber.classList.remove('empty-state');
                    codeHint.textContent = '璇峰湪 App 涓緭鍏ユ鐧诲綍鐮?;
                    
                    let remainingTime = 120;
                    clearInterval(expiryTimer);
                    
                    expiryTimer = setInterval(() => {
                        remainingTime--;
                        codeExpiry.textContent = `姝ょ櫥褰曠爜浠呭湪 ${Math.floor(remainingTime / 60)}:${(remainingTime % 60).toString().padStart(2, '0')} 鍐呮湁鏁坄;
                        
                        if (remainingTime <= 0) {
                            clearInterval(expiryTimer);
                            codeNumber.textContent = '宸茶繃鏈?;
                            codeNumber.classList.add('empty-state');
                            codeHint.textContent = codeExpiry.textContent = '';
                        }
                    }, 1000);
                }
            } catch (error) {
                codeNumber.textContent = '鐢熸垚澶辫触';
                codeNumber.classList.add('empty-state');
                codeHint.textContent = '璇风◢鍚庨噸璇?;
                codeExpiry.textContent = '';
            }

            btn.disabled = true;
            let cooldown = 10;
            countdownEl.textContent = `璇风瓑寰?${cooldown} 绉掑悗鍐嶆鐢熸垚`;
            clearInterval(cooldownTimer);
            
            cooldownTimer = setInterval(() => {
                cooldown--;
                countdownEl.textContent = cooldown > 0 ? `璇风瓑寰?${cooldown} 绉掑悗鍐嶆鐢熸垚` : '';
                if (cooldown <= 0) btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
